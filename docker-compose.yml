services:
  db:
    hostname: db
    restart: unless-stopped
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cards
      POSTGRES_PASSWORD: heresapassword
    volumes:
      - "dbvolume:/var/lib/postgresql/data"
      - ./src/cardex/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cards"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: cards@email.com
      PGADMIN_DEFAULT_PASSWORD: heresapassword
    ports:
      - "8081:80"

  frontend:
    build: 
      context: .
      dockerfile: ./src/cardex/web/Dockerfile
    restart: unless-stopped
    environment:
      FLASK_DEBUG: 1
      FLASK_APP: cardex.web
    ports:
      - "8082:8080"
    volumes:
      - ./config.ini:/app/config.ini
      - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: 
      context: .
      dockerfile: src/cardex/worker/Dockerfile
    volumes:
      - ./config.ini:/app/config.ini
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbvolume:
